networks:
  onforkhub-network:
    driver: bridge

services:
  onforkhub-api:
    image: ghcr.io/rondineleg/onforkhub-api:latest
    container_name: onforkhub-api
    restart: unless-stopped
    networks:
      - onforkhub-network
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
      - ASPNETCORE_HTTPSREDIRECTION_ENABLED=false
      - Cache__UseRedis=true
      - Cache__RedisConnectionString=redis:6379
      - Jaeger__Host=jaeger
      - Jaeger__Port=4317
    depends_on:
      - redis
      - jaeger
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M

  onforkhub-web:
    image: ghcr.io/rondineleg/onforkhub-web:latest
    container_name: onforkhub-web
    restart: unless-stopped
    networks:
      - onforkhub-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  redis:
    image: redis:alpine
    container_name: onforkhub-redis
    restart: unless-stopped
    networks:
      - onforkhub-network
    ports:
      - "6379:6379"

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: onforkhub-jaeger
    restart: unless-stopped
    networks:
      - onforkhub-network
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  reverse-proxy:
    image: nginx:alpine
    container_name: reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./custom.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/zerossl:/etc/ssl/zerossl:ro
    networks:
      - onforkhub-network
    depends_on:
      onforkhub-api:
        condition: service_started
      onforkhub-web:
        condition: service_started

name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, dev, 'releases/*']

jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: JetBrains/qodana-action@v2024.2
        with:
          args: --baseline qodana.sarif.json
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
